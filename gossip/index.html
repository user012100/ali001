<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link href="reset.css" rel="stylesheet">
		<link href="style.css" rel="stylesheet">
		<!-- defer runs the script after the DOM is loaded -->
		<script defer src="arena.js"></script>
		<title>Gossip</title>
	</head>
	<body>
		<!-- header -->
		<header>
			<a href="#"><img src="assets/logo.svg" alt="Gossip" id="title-logo"></a>
			<!-- navigation -->
			<nav>
				<section class="nav-filter-option">
					<img src="assets/select-button.svg" class="nav-select" alt="">
					<button type="button" id="filter-all-button">
						<img src="assets/button.svg">
						<p>All</p>
					</button>
				</section>
				<section class="nav-filter-option">
					<button type="button" id="filter-images-button">
						<img src="assets/button.svg">
						<p>Images</p>
					</button>
				</section>
				<section class="nav-filter-option">
					<button type="button" id="filter-videos-button">
						<img src="assets/button.svg">
						<p>Videos</p>
					</button>
				</section>
				<section class="nav-filter-option">
					<button type="button" id="filter-others-button">
						<img src="assets/button.svg">
						<p>Other</p>
					</button>
				</section>
				<section class="nav-filter-option">
					<button type="button" id="omg-button">
						<img src="assets/button.svg">
						<p>OMG!</p>
					</button>
				</section>
			</nav>
		</header>
		<!-- main blocks -->
		<main>
			<section>
				<ul id="channel-blocks"></ul>
			</section>
		</main>
		<!-- footer -->
		<section id="footer-content">
			<section id="background-button-container">
				<img src="assets/button.svg" id="background-button">
			</section>
			<section id="description">
				<h1 id="channel-title"></h1>
				<section id="channel-description"></section>
			</section>
		</section>
	</body>
</html>
